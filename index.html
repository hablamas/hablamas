<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weller Store</title>
    <style>
        /* (Conserve tes styles One UI ici) */
        body { background: #f2f2f7; font-family: sans-serif; padding: 20px; }
        .countries-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
        .country-card { background: #fff; border-radius: 24px; padding: 16px; text-align: center; border: 2px solid transparent; }
        .country-card.selected { border-color: #007aff; background: #eef6ff; }
        #buy-button { position: fixed; bottom: 30px; left: 20px; right: 20px; padding: 18px; border-radius: 30px; background: #007aff; color: white; border: none; font-weight: bold; display: none; }
    </style>
</head>
<body>

    <h1>Weller Store</h1>
    <div class="countries-grid" id="grid"></div>
    <button id="buy-button">Acheter</button>

    <script>
        const EDGE_URL = '×××××××××××××';
        // REMPLACE CETTE CLÉ PAR TA CLÉ PUBLIQUE (ANON) SUPABASE
        const SUPABASE_ANON_KEY = 'TA_CLE_PUBLIQUE_ANON_ICI';

        async function loadCountries() {
            try {
                const response = await fetch(EDGE_URL, {
                    method: 'GET',
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                if (!response.ok) throw new Error('Erreur de connexion');
                const data = await response.json();
                render(data);
            } catch (err) {
                console.error(err);
                alert("Erreur: Vérifie la console (F12) pour voir si c'est un blocage CORS.");
            }
        }

        function render(list) {
            const grid = document.getElementById('grid');
            list.forEach(c => {
                const card = document.createElement('div');
                card.className = 'country-card';
                card.innerHTML = `<img src="${c.flag_url}" width="40"><br>${c.country_name}<br><small>${c.dial_code}</small>`;
                card.onclick = () => {
                    document.querySelectorAll('.country-card').forEach(e => e.classList.remove('selected'));
                    card.classList.add('selected');
                    document.getElementById('buy-button').style.display = 'block';
                };
                grid.appendChild(card);
            });
        }

        loadCountries();
    </script>
</body>
</html>
